🇸🇬 狮城节点 = select,policy-regex-filter=(?=.*(🇸🇬|SG|SGP|Singapore|singapore|Singapura|新加坡|狮城|獅城|沪新|京新|深新|杭新|广新))^((?!(家宽|家寬|家庭宽带|家庭寬帶|住宅|Residential|residential)).)*$
